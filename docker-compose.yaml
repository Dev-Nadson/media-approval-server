services:
  postgres:
    container_name: "media_postgres"
    image: "bitnami/postgresql:latest"
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: docker
      POSTGRES_DB: media_approval
    volumes:
      - "media_database_data:/bitnami/postgresql"

volumes:
  media_database_data:
